<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema CECYTEA </title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="creative-bg">
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
            <div class="shape shape-5"></div>
        </div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="card-decoration">
                <div class="deco-line line-1"></div>
                <div class="deco-line line-2"></div>
                <div class="deco-line line-3"></div>
            </div>
            
            <div class="login-header">
                <div class="creative-logo">
                    <img style="width: 90px; height: 90px;" src="img/logo cecytea.png" alt="">
                </div>
                <h2>Sistema CECYTEA San Jose de Gracia</h2>
            </div>
            
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <div class="input-wrapper">
                        <div class="input-decoration"></div>
                        <input type="email" id="email" name="email" required autocomplete="email">
                        <label for="email">Correo Electronico</label>
                        <div class="input-waves">
                            <div class="wave wave-1"></div>
                            <div class="wave wave-2"></div>
                            <div class="wave wave-3"></div>
                        </div>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <div class="input-wrapper password-wrapper">
                        <div class="input-decoration"></div>
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <label for="password">Contraseña</label>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
                            <span class="toggle-icon"></span>
                        </button>
                        <div class="input-waves">
                            <div class="wave wave-1"></div>
                            <div class="wave wave-2"></div>
                            <div class="wave wave-3"></div>
                        </div>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <div class="remember-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember" class="checkbox-label">
                            <div class="checkbox-creative">
                                <div class="check-mark"></div>
                            </div>
                            Permanecer con la sesion 
                        </label>
                    </div>
                    <a href="#" class="forgot-password">¿Olvidaste tu Contraseña?</a>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-bg"></span>
                    <span class="btn-text">Iniciar Sesion</span>
                    <span class="btn-loader">
                        <div class="loader-dot dot-1"></div>
                        <div class="loader-dot dot-2"></div>
                        <div class="loader-dot dot-3"></div>
                    </span>
                </button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span>Inciar sesion con</span>
                <div class="divider-line"></div>
            </div>

            <div class="creative-social">
                <button type="button" class="social-btn behance-btn">
                    <div class="social-icon behance-icon"></div>
                    <span>Google</span>
                </button>
            </div>

            <div class="signup-link">
                <p>No tienes cuenta? <a href="registro.html">Crea tu cuenta</a></p>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-animation">
                    <div class="success-circle"></div>
                    <div class="success-checkmark">✓</div>
                </div>
                <h3>Bienvenido</h3>
                <p>Entrando el sistema...</p>
            </div>
        </div>
    </div>

    <script src="./shared/js/form-utils.js"></script>
    <script src="/js/script.js"></script>
</body>
</html>
