<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - Planix</title>
<link rel="icon" type="image/x-icon" href="img/planix-icon-64.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    /* ── base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f2a35, #123d52);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px 16px;
    }

    /* ── card ── */
    .wrapper {
      background: #ffffff;
      padding: clamp(20px, 5vw, 36px) clamp(18px, 5vw, 44px);
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    /* ── logo ── */
    .logo {
      width: 100%;
      max-width: clamp(100px, 40vw, 200px);
      height: auto;
      object-fit: contain;
      margin: 0 auto 12px;
      display: block;
    }

    /* ── título ── */
    h2 {
      color: #0057A3;
      margin-bottom: clamp(14px, 3vw, 22px);
      font-size: clamp(18px, 4.5vw, 22px);
      font-weight: 700;
    }

    /* ── campos ── */
    .mb-3 { margin-bottom: clamp(10px, 2.5vw, 16px) !important; }

    .input-label {
      color: #0057A3;
      font-size: clamp(11px, 2.5vw, 13px);
      margin-bottom: 5px;
      display: block;
      text-align: left;
    }

    .custom-input { position: relative; }

    .custom-input .form-control {
      background-color: #e6edf3;
      border: none;
      border-radius: 24px;
      padding: clamp(10px, 2.5vw, 14px) clamp(36px, 8vw, 48px);
      color: #0057A3;
      font-size: clamp(13px, 3vw, 15px);
      width: 100%;
      transition: box-shadow 0.2s;
    }
    .custom-input .form-control::placeholder { color: #8fa6b2; }
    .custom-input .form-control:focus {
      background-color: #e6edf3;
      box-shadow: 0 0 0 3px rgba(0,87,163,0.15);
      outline: none;
    }

    .input-icon-left {
      position: absolute; left: clamp(12px, 3vw, 18px); top: 50%;
      transform: translateY(-50%);
      color: #00A651; font-size: clamp(15px, 3.5vw, 18px);
      pointer-events: none;
    }
    .input-icon-right {
      position: absolute; right: clamp(12px, 3vw, 18px); top: 50%;
      transform: translateY(-50%);
      color: #8fa6b2; font-size: clamp(15px, 3.5vw, 18px);
      cursor: pointer; transition: color 0.2s;
    }
    .input-icon-right:hover { color: #00A651; }

    /* quitar flechas number */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

    /* ── recordarme ── */
    .form-check {
      text-align: left;
      margin-bottom: clamp(12px, 3vw, 18px);
      font-size: clamp(12px, 2.8vw, 14px);
      display: flex; align-items: center; gap: 8px;
    }
    .form-check-input {
      width: 16px; height: 16px;
      accent-color: #0057A3; cursor: pointer; flex-shrink: 0;
    }

    /* ── botón registrar ── */
    .botones {
      width: 100%;
      padding: clamp(11px, 2.5vw, 14px) 0;
      background: linear-gradient(90deg, #0057A3, #00A651);
      color: white; border: none; border-radius: 30px;
      font-size: clamp(13px, 3vw, 15px);
      font-weight: 600;
      box-shadow: 0 8px 22px rgba(0,87,163,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .botones:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,87,163,0.5);
    }

    /* ── botón google ── */
    .google-btn {
      margin-top: clamp(10px, 2.5vw, 14px);
      width: 100%;
      padding: clamp(10px, 2.5vw, 14px) 0;
      background: linear-gradient(180deg, #0f2a35, #0b1e27);
      border: none; border-radius: 30px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      color: #fff;
      font-size: clamp(12px, 2.8vw, 14px);
      font-weight: 500; cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .google-btn img { width: 18px; height: 18px; flex-shrink: 0; }
    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.5);
    }

    /* ── link login ── */
    .link-registro {
      margin-top: clamp(12px, 3vw, 16px);
      font-size: clamp(12px, 2.8vw, 14px);
      color: #555;
    }
    .link-registro a {
      color: #0057A3; font-weight: 700; text-decoration: none;
    }
    .link-registro a:hover { text-decoration: underline; }

    /* ── pantallas muy pequeñas ── */
    @media (max-width: 360px) {
      .wrapper { padding: 16px 14px; }
      h2 { font-size: 17px; }
    }

    /* ── pantallas muy bajas (landscape móvil) ── */
    @media (max-height: 600px) {
      body { align-items: flex-start; }
      .wrapper { margin: 0 auto; }
      .mb-3 { margin-bottom: 8px !important; }
      h2 { margin-bottom: 10px; }
    }
  </style>
</head>

<body>
<div class="wrapper">

  <img src="img/CECyTE-Aguascalientes.png" alt="Logo CECyTEA" class="logo"
       onerror="this.style.display='none'">

  <h2>Crear Cuenta</h2>

  <form>

    <div class="mb-3">
      <label class="input-label">Nombre(s)</label>
      <div class="custom-input">
        <i class="bi bi-person-fill input-icon-left"></i>
        <input type="text" class="form-control" name="nombre" placeholder="Tu nombre" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="input-label">Apellidos</label>
      <div class="custom-input">
        <i class="bi bi-person-fill input-icon-left"></i>
        <input type="text" class="form-control" name="apellido_paterno" placeholder="Tus apellidos" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="input-label">Número Telefónico</label>
      <div class="custom-input">
        <i class="bi bi-telephone-fill input-icon-left"></i>
        <input id="telefono" class="form-control" type="number" placeholder="10 dígitos" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="input-label">Email</label>
      <div class="custom-input">
        <i class="bi bi-envelope-fill input-icon-left"></i>
        <input id="usuario" class="form-control" type="text" placeholder="name@cecytea.edu.mx" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="input-label">Contraseña</label>
      <div class="custom-input">
        <i class="bi bi-lock-fill input-icon-left"></i>
        <input id="password" class="form-control" type="password" placeholder="••••••••" required>
        <i class="bi bi-eye input-icon-right" id="togglePassword"></i>
      </div>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="remember" checked>
      <label class="form-check-label" for="remember">Recordarme</label>
    </div>

    <button id="boton" type="button" class="botones">Registrar</button>

    <button type="button" class="google-btn">
      <img src="img/google.png" alt="Google">
      Crear con Google
    </button>

  </form>

  <div class="link-registro">
    ¿Ya tienes cuenta? <a href="index.html">Iniciar Sesión</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // toggle contraseña
  document.getElementById('togglePassword').addEventListener('click', function () {
    const input = document.getElementById('password');
    const isPass = input.type === 'password';
    input.type = isPass ? 'text' : 'password';
    this.classList.toggle('bi-eye',       !isPass);
    this.classList.toggle('bi-eye-slash',  isPass);
  });
</script>

<script src="js/registro.js"></script>
</body>
</html>
